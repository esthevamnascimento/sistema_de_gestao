<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Ferramentas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

    <div id="nav-placeholder"></div>

    <div class="max-w-6xl mx-auto bg-white p-6 rounded-lg shadow-md mt-6">
        <h1 class="text-2xl font-bold mb-4 text-gray-800">Cadastro de Ferramentas</h1>
        
        <div id="areaCadastro">
            <form id="toolForm" class="mb-8 space-y-4 border p-4 rounded bg-gray-50 shadow-sm">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="text-xs text-gray-500 font-bold">Código Interno</label>
                        <input type="text" id="toolCode" placeholder="Ex: FUR-01" class="border p-2 rounded w-full uppercase" required>
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 font-bold">Nome da Ferramenta</label>
                        <input type="text" id="toolName" placeholder="Ex: Furadeira de Impacto" class="border p-2 rounded w-full" required>
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 font-bold">Próxima Manutenção Preventiva</label>
                        <input type="date" id="toolDate" class="border p-2 rounded w-full" required>
                    </div>
                </div>
                <button type="submit" class="bg-gray-800 text-white px-6 py-2 rounded hover:bg-black font-bold">
                    🛠️ Cadastrar Ferramenta
                </button>
            </form>
        </div>

        <h2 class="text-xl font-semibold mb-2">Ferramentas Cadastradas</h2>
        <ul id="toolList" class="divide-y divide-gray-200"></ul>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const userRole = localStorage.getItem('role');
        if (!token) window.location.href = '/login';

        if (userRole !== 'admin') {
            const area = document.getElementById('areaCadastro');
            if(area) area.style.display = 'none';
        }

        async function apiFetch(url, options = {}) {
            options.headers = { ...options.headers, 'Authorization': `Bearer ${token}` };
            const response = await fetch(url, options);
            if (response.status === 401) {
                localStorage.clear();
                window.location.href = '/login';
            }
            return response;
        }

        async function fetchTools() {
            const res = await apiFetch('/api/tool/');
            if (!res.ok) return;
            const tools = await res.json();
            const list = document.getElementById('toolList');
            list.innerHTML = '';
            
            const todayStr = new Date().toISOString().split('T')[0];

            tools.forEach(tool => {
                const dataFormatada = tool.next_maintenance_date.split('-').reverse().join('/');
                const isOverdue = tool.next_maintenance_date < todayStr;
                const statusHtml = isOverdue 
                    ? `<span class="bg-red-100 text-red-700 px-2 py-1 rounded text-xs font-bold animate-pulse shadow-sm">⚠️ Manutenção Atrasada</span>`
                    : `<span class="bg-green-50 text-green-700 px-2 py-1 rounded text-xs font-bold shadow-sm">✅ Em dia</span>`;

                const btnExcluir = userRole === 'admin' 
                    ? `<button onclick="deleteTool(${tool.id})" class="text-red-500 hover:text-red-700 text-sm font-bold border border-red-200 px-3 py-1 rounded hover:bg-red-50">🗑️ Excluir</button>` : ``;

                list.innerHTML += `
                    <li class="py-4 flex flex-col md:flex-row md:justify-between items-center hover:bg-gray-50 px-3 rounded border-b">
                        <div class="flex-grow w-full">
                            <strong class="text-lg text-gray-800">${tool.name}</strong> <span class="text-sm bg-gray-200 px-2 py-1 rounded text-gray-700 font-mono ml-2">${tool.code}</span>
                            <p class="text-sm text-gray-600 mt-1">Próxima Revisão: <span class="font-bold">${dataFormatada}</span></p>
                            <div class="mt-2">${statusHtml}</div>
                        </div>
                        <div class="mt-4 md:mt-0 flex-shrink-0">
                            ${btnExcluir}
                        </div>
                    </li>`;
            });
        }

        document.getElementById('toolForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                code: document.getElementById('toolCode').value.toUpperCase(),
                name: document.getElementById('toolName').value,
                next_maintenance_date: document.getElementById('toolDate').value
            };

            const res = await apiFetch('/api/tool/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                fetchTools();
                e.target.reset();
            } else {
                const error = await res.json();
                alert("Erro: " + JSON.stringify(error.detail));
            }
        });

        async function deleteTool(id) {
            if(!confirm("Tem certeza que deseja remover esta ferramenta?")) return;
            const res = await apiFetch(`/api/tool/${id}`, { method: 'DELETE' });
            if(res.ok) fetchTools();
        }

        fetch('/nav.html').then(r => r.text()).then(html => {
            document.getElementById('nav-placeholder').innerHTML = html;
            const navRole = localStorage.getItem('role');
            const badge = document.getElementById('userBadge');
            if (badge) badge.innerText = navRole || 'Desconhecido';
            if (navRole === 'admin') {
                const navUsuarios = document.getElementById('navUsuarios');
                if(navUsuarios) navUsuarios.style.display = 'inline-block';
            }
        });

        fetchTools();
    </script>
</body>
</html>
