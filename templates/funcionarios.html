<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Funcionários</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

    <div id="nav-placeholder"></div>

    <div class="max-w-6xl mx-auto bg-white p-6 rounded-lg shadow-md mt-6">
        <h1 class="text-2xl font-bold mb-4 text-gray-800">Cadastro de Funcionários</h1>
        
        <div id="areaCadastro">
            <form id="empForm" class="mb-8 space-y-4 border p-4 rounded bg-gray-50 shadow-sm">
                <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4">
                    <div class="lg:col-span-1">
                        <label class="text-xs text-gray-500 font-bold">Matrícula <span class="text-red-500">*</span></label>
                        <input type="text" id="empCode" placeholder="Ex: OP-001" class="border p-2 rounded w-full" required>
                    </div>
                    <div class="lg:col-span-2">
                        <label class="text-xs text-gray-500 font-bold">Nome Completo <span class="text-red-500">*</span></label>
                        <input type="text" id="empName" placeholder="Nome do colaborador" class="border p-2 rounded w-full" required>
                    </div>
                    <div class="lg:col-span-1">
                        <label class="text-xs text-gray-500 font-bold">CPF <span class="text-red-500">*</span></label>
                        <input type="text" id="empCpf" placeholder="000.000.000-00" class="border p-2 rounded w-full" required>
                    </div>
                    <div class="lg:col-span-1">
                        <label class="text-xs text-gray-500 font-bold">Data de Admissão <span class="text-red-500">*</span></label>
                        <input type="date" id="empDate" class="border p-2 rounded w-full" required>
                    </div>
                    <div class="lg:col-span-1">
                        <label class="text-xs text-gray-500 font-bold">Telefone <span class="text-red-500">*</span></label>
                        <input type="text" id="empPhone" placeholder="(11) 99999-9999" class="border p-2 rounded w-full" required>
                    </div>
                    <div class="lg:col-span-6">
                        <label class="text-xs text-gray-500 font-bold">Cargo <span class="text-red-500">*</span></label>
                        <input type="text" id="empRole" placeholder="Ex: Encanador GLP, Soldador, Auxiliar" class="border p-2 rounded w-full" required>
                    </div>
                </div>

                <h3 class="text-sm font-bold text-indigo-700 mt-6 border-b pb-2">🏥 Segurança, Saúde e Certificações (Datas de Vencimento)</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4 mt-4">
                    <div>
                        <label class="text-xs text-gray-500 font-bold">Ficha de EPI</label>
                        <input type="date" id="empFichaEpi" class="border p-2 rounded w-full text-gray-600">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 font-bold">Vencimento ASO</label>
                        <input type="date" id="empAso" class="border p-2 rounded w-full text-gray-600">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 font-bold">Vencimento NR-12</label>
                        <input type="date" id="empNr12" class="border p-2 rounded w-full text-gray-600">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 font-bold">Vencimento NR-13</label>
                        <input type="date" id="empNr13" class="border p-2 rounded w-full text-gray-600">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 font-bold">Vencimento NR-35</label>
                        <input type="date" id="empNr35" class="border p-2 rounded w-full text-gray-600">
                    </div>
                </div>

                <div class="mt-6 flex justify-end">
                    <button type="submit" class="bg-indigo-600 text-white px-8 py-2 rounded hover:bg-indigo-700 font-bold shadow">
                        👷 Cadastrar Colaborador
                    </button>
                </div>
            </form>
        </div>

        <h2 class="text-xl font-semibold mb-2">Equipe Cadastrada</h2>
        <ul id="empList" class="divide-y divide-gray-200"></ul>
    </div>

    <div id="docsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-lg shadow-lg w-full max-w-lg">
            <h2 class="text-xl font-bold mb-4 text-indigo-700">Atualizar Vencimentos</h2>
            <form id="docsForm" class="space-y-4">
                <input type="hidden" id="docsEmpId">
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    <div>
                        <label class="text-xs text-gray-500 font-bold">Ficha EPI</label>
                        <input type="date" id="docFichaEpi" class="border p-2 rounded w-full text-gray-600">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 font-bold">ASO</label>
                        <input type="date" id="docAso" class="border p-2 rounded w-full text-gray-600">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 font-bold">NR-12</label>
                        <input type="date" id="docNr12" class="border p-2 rounded w-full text-gray-600">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 font-bold">NR-13</label>
                        <input type="date" id="docNr13" class="border p-2 rounded w-full text-gray-600">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 font-bold">NR-35</label>
                        <input type="date" id="docNr35" class="border p-2 rounded w-full text-gray-600">
                    </div>
                </div>
                <div class="flex justify-end gap-2 mt-6">
                    <button type="button" onclick="closeDocsModal()" class="px-4 py-2 text-gray-500 hover:bg-gray-100 rounded font-bold">Cancelar</button>
                    <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700 font-bold shadow">Salvar Datas</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const userRole = localStorage.getItem('role');
        if (!token) window.location.href = '/login';

        if (userRole !== 'admin') {
            const area = document.getElementById('areaCadastro');
            if(area) area.style.display = 'none';
        }

        async function apiFetch(url, options = {}) {
            options.headers = { ...options.headers, 'Authorization': `Bearer ${token}` };
            const response = await fetch(url, options);
            if (response.status === 401) {
                localStorage.removeItem('token');
                window.location.href = '/login';
            }
            return response;
        }

        function renderBadge(label, dateStr) {
            if (!dateStr) return `<span class="bg-gray-100 text-gray-400 px-2 py-1 rounded text-[10px] font-bold border border-gray-200">${label}: N/A</span>`;
            
            const todayStr = new Date().toISOString().split('T')[0];
            const formattedDate = dateStr.split('-').reverse().join('/');
            
            if (dateStr < todayStr) {
                return `<span class="bg-red-100 text-red-700 px-2 py-1 rounded text-[10px] font-bold border border-red-200 animate-pulse shadow-sm" title="Vencido em ${formattedDate}">⚠️ ${label}: ${formattedDate}</span>`;
            }
            return `<span class="bg-green-50 text-green-700 px-2 py-1 rounded text-[10px] font-bold border border-green-200 shadow-sm" title="Válido até ${formattedDate}">✅ ${label}: ${formattedDate}</span>`;
        }

        async function fetchEmployees() {
            const res = await apiFetch('/api/employee/');
            if (!res.ok) return;
            const employees = await res.json();
            const list = document.getElementById('empList');
            list.innerHTML = '';
            
            employees.forEach(emp => {
                const dataFormatada = emp.admission_date.split('-').reverse().join('/');
                
                const asoArg = emp.aso_date ? `'${emp.aso_date}'` : 'null';
                const nr12Arg = emp.nr12_date ? `'${emp.nr12_date}'` : 'null';
                const nr13Arg = emp.nr13_date ? `'${emp.nr13_date}'` : 'null';
                const nr35Arg = emp.nr35_date ? `'${emp.nr35_date}'` : 'null';
                const fichaEpiArg = emp.ficha_epi_date ? `'${emp.ficha_epi_date}'` : 'null';

                const btnAtualizar = `<button onclick="openDocsModal(${emp.id}, ${asoArg}, ${nr12Arg}, ${nr13Arg}, ${nr35Arg}, ${fichaEpiArg})" class="text-indigo-600 hover:text-indigo-800 text-sm font-bold border border-indigo-200 px-3 py-1 rounded hover:bg-indigo-50 shadow-sm mr-2">🔄 Atualizar Docs</button>`;

                const btnExcluir = userRole === 'admin' 
                    ? `<button onclick="deleteEmp(${emp.id})" class="text-red-500 hover:text-red-700 text-sm font-bold border border-red-200 px-3 py-1 rounded hover:bg-red-50">🗑️ Excluir</button>`
                    : ``;

                list.innerHTML += `
                    <li class="py-4 flex flex-col md:flex-row md:justify-between items-center hover:bg-gray-50 px-3 rounded border-b transition-colors">
                        <div class="flex-grow w-full">
                            <strong class="text-lg text-gray-800">${emp.name}</strong> <span class="text-sm bg-gray-200 px-2 py-1 rounded text-gray-700 font-mono ml-2">${emp.employee_code}</span>
                            <p class="text-sm text-gray-600 mt-1">${emp.role} | Admissão: <span class="font-bold">${dataFormatada}</span></p>
                            <p class="text-xs text-gray-500">CPF: ${emp.cpf} | Tel: ${emp.phone}</p>
                            
                            <div class="mt-3 flex gap-2 flex-wrap">
                                ${renderBadge('Ficha EPI', emp.ficha_epi_date)}
                                ${renderBadge('ASO', emp.aso_date)}
                                ${renderBadge('NR-12', emp.nr12_date)}
                                ${renderBadge('NR-13', emp.nr13_date)}
                                ${renderBadge('NR-35', emp.nr35_date)}
                            </div>
                        </div>
                        <div class="mt-4 md:mt-0 flex-shrink-0 flex items-center">
                            ${btnAtualizar}
                            ${btnExcluir}
                        </div>
                    </li>`;
            });
        }

        document.getElementById('empForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                employee_code: document.getElementById('empCode').value,
                name: document.getElementById('empName').value,
                cpf: document.getElementById('empCpf').value,
                role: document.getElementById('empRole').value,
                phone: document.getElementById('empPhone').value,
                admission_date: document.getElementById('empDate').value,
                aso_date: document.getElementById('empAso').value || null,
                nr12_date: document.getElementById('empNr12').value || null,
                nr13_date: document.getElementById('empNr13').value || null,
                nr35_date: document.getElementById('empNr35').value || null,
                ficha_epi_date: document.getElementById('empFichaEpi').value || null
            };

            const res = await apiFetch('/api/employee/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                fetchEmployees();
                e.target.reset();
            } else {
                const error = await res.json();
                alert("Erro: " + JSON.stringify(error.detail));
            }
        });

        function openDocsModal(id, aso, nr12, nr13, nr35, fichaEpi) {
            document.getElementById('docsEmpId').value = id;
            document.getElementById('docAso').value = aso || '';
            document.getElementById('docNr12').value = nr12 || '';
            document.getElementById('docNr13').value = nr13 || '';
            document.getElementById('docNr35').value = nr35 || '';
            document.getElementById('docFichaEpi').value = fichaEpi || '';
            document.getElementById('docsModal').classList.remove('hidden');
        }

        function closeDocsModal() {
            document.getElementById('docsModal').classList.add('hidden');
            document.getElementById('docsForm').reset();
        }

        document.getElementById('docsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('docsEmpId').value;
            const data = {
                aso_date: document.getElementById('docAso').value || null,
                nr12_date: document.getElementById('docNr12').value || null,
                nr13_date: document.getElementById('docNr13').value || null,
                nr35_date: document.getElementById('docNr35').value || null,
                ficha_epi_date: document.getElementById('docFichaEpi').value || null
            };

            const res = await apiFetch(`/api/employee/${id}/docs`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                closeDocsModal();
                fetchEmployees(); 
            } else {
                const error = await res.json();
                alert("Erro ao atualizar: " + JSON.stringify(error.detail));
            }
        });

        async function deleteEmp(id) {
            if(!confirm("Tem certeza que deseja remover este funcionário?")) return;
            const res = await apiFetch(`/api/employee/${id}`, { method: 'DELETE' });
            if(res.ok) fetchEmployees();
        }

        fetch('/nav.html').then(r => r.text()).then(html => {
            document.getElementById('nav-placeholder').innerHTML = html;
            const navRole = localStorage.getItem('role');
            const badge = document.getElementById('userBadge');
            if (badge) badge.innerText = navRole || 'Desconhecido';
            if (navRole === 'admin') {
                const navUsuarios = document.getElementById('navUsuarios');
                if(navUsuarios) navUsuarios.style.display = 'inline-block';
            }
        });

        fetchEmployees();
    </script>
</body>
</html>
