<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos de Compra de EPI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

    <div id="nav-placeholder"></div>

    <div class="max-w-5xl mx-auto bg-white p-6 rounded-lg shadow-md mt-6">
        <h1 class="text-2xl font-bold mb-4 text-gray-800">Solicitação de Compra de EPI</h1>
        
        <form id="requestForm" class="mb-8 space-y-4 border p-4 rounded bg-gray-50">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="text-xs text-gray-500 font-bold">Funcionário Solicitante</label>
                    <select id="reqEmployee" class="border p-2 rounded w-full bg-white" required>
                        <option value="">Carregando equipe...</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-gray-500 font-bold">EPI Solicitado (Detalhes)</label>
                    <input type="text" id="reqDesc" placeholder="Ex: Bota de Segurança Tam 42" class="border p-2 rounded w-full" required>
                </div>
                <div>
                    <label class="text-xs text-gray-500 font-bold">Data da Solicitação</label>
                    <input type="date" id="reqDate" class="border p-2 rounded w-full" required>
                </div>
            </div>
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 font-bold">
                📝 Registrar Pedido
            </button>
        </form>

        <h2 class="text-xl font-semibold mb-2">Histórico de Pedidos</h2>
        <ul id="requestList" class="divide-y divide-gray-200"></ul>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const userRole = localStorage.getItem('role');
        if (!token) window.location.href = '/login';

        function logout() {
            localStorage.clear();
            window.location.href = '/login';
        }

        async function apiFetch(url, options = {}) {
            options.headers = { ...options.headers, 'Authorization': `Bearer ${token}` };
            const response = await fetch(url, options);
            if (response.status === 401) logout();
            return response;
        }

        async function loadEmployees() {
            const res = await apiFetch('/api/employee/');
            if (!res.ok) return;
            const employees = await res.json();
            const select = document.getElementById('reqEmployee');
            select.innerHTML = '<option value="">Selecione o Funcionário</option>';
            employees.forEach(emp => {
                select.innerHTML += `<option value="${emp.id}">${emp.name} (${emp.role})</option>`;
            });
        }

        async function fetchRequests() {
            const res = await apiFetch('/api/epi/request');
            if (!res.ok) return;
            const requests = await res.json();
            const list = document.getElementById('requestList');
            list.innerHTML = '';
            
            requests.forEach(req => {
                const dataFormatada = req.request_date.split('-').reverse().join('/');
                
                let statusHtml = '';
                let btnAtender = '';
                
                if (req.status === 'Pendente') {
                    statusHtml = '<span class="bg-yellow-100 text-yellow-800 px-2 py-1 rounded text-xs font-bold">⚠️ Pendente de Compra</span>';
                    if (userRole === 'admin') {
                        btnAtender = `<button onclick="atenderPedido(${req.id})" class="bg-green-100 text-green-700 hover:bg-green-200 font-bold px-3 py-1 rounded border border-green-300 ml-2 shadow-sm">✅ Marcar como Comprado</button>`;
                    }
                } else {
                    statusHtml = '<span class="bg-green-100 text-green-800 px-2 py-1 rounded text-xs font-bold">📦 Atendido / Entregue</span>';
                }

                list.innerHTML += `
                    <li class="py-4 flex flex-col md:flex-row md:justify-between items-center hover:bg-gray-50 px-2 rounded border-b">
                        <div class="flex-grow">
                            <strong class="text-lg text-gray-800">${req.epi_description}</strong>
                            <br><span class="text-sm text-gray-600">Solicitado por: <span class="font-bold text-indigo-700">${req.employee_name}</span> em ${dataFormatada}</span>
                        </div>
                        <div class="mt-3 md:mt-0 flex items-center">
                            ${statusHtml}
                            ${btnAtender}
                        </div>
                    </li>`;
            });
        }

        document.getElementById('requestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                employee_id: parseInt(document.getElementById('reqEmployee').value),
                epi_description: document.getElementById('reqDesc').value,
                request_date: document.getElementById('reqDate').value
            };

            const res = await apiFetch('/api/epi/request', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                fetchRequests();
                document.getElementById('reqDesc').value = ''; 
            } else {
                const error = await res.json();
                alert("Erro: " + JSON.stringify(error.detail));
            }
        });

        async function atenderPedido(id) {
            if(!confirm("Confirmar que este EPI foi comprado/entregue ao funcionário?")) return;
            const res = await apiFetch(`/api/epi/request/${id}/atender`, { method: 'PUT' });
            if(res.ok) fetchRequests();
        }

        fetch('/nav.html').then(r => r.text()).then(html => {
            document.getElementById('nav-placeholder').innerHTML = html;
            const navRole = localStorage.getItem('role');
            const badge = document.getElementById('userBadge');
            if (badge) badge.innerText = navRole || 'Desconhecido';
            if (navRole === 'admin') {
                const navUsuarios = document.getElementById('navUsuarios');
                if(navUsuarios) navUsuarios.style.display = 'inline-block';
            }
        });

        document.getElementById('reqDate').valueAsDate = new Date();
        loadEmployees();
        fetchRequests();
    </script>
</body>
</html>
