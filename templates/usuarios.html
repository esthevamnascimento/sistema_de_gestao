<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Acessos - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

    <div id="nav-placeholder"></div>

    <div class="max-w-5xl mx-auto bg-white p-6 rounded-lg shadow-md border-t-4 border-indigo-900 mt-6">
        <h1 class="text-2xl font-bold mb-4 text-gray-800">🔐 Painel de Controle de Acessos</h1>
        
        <form id="userForm" class="mb-8 space-y-4 border p-4 rounded bg-gray-50 shadow-sm">
            <h2 class="text-sm font-bold text-indigo-700 mb-2 border-b pb-1">Adicionar Novo Usuário ao Sistema</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="text-xs text-gray-700 font-bold">Login do Usuário (Username)</label>
                    <input type="text" id="userName" placeholder="Ex: joao.silva" class="border p-2 rounded w-full lowercase" required>
                </div>
                <div>
                    <label class="text-xs text-gray-700 font-bold">Senha Inicial</label>
                    <input type="text" id="userPass" placeholder="Digite uma senha" class="border p-2 rounded w-full" required>
                </div>
                <div>
                    <label class="text-xs text-gray-700 font-bold">Nível de Acesso (Perfil)</label>
                    <select id="userRole" class="border p-2 rounded w-full bg-white" required>
                        <option value="operador">Operador (Apenas Leitura / Lançamentos)</option>
                        <option value="admin">Administrador (Acesso Total)</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="bg-indigo-900 text-white px-6 py-2 rounded hover:bg-black font-bold shadow">
                ➕ Criar Conta
            </button>
        </form>

        <h2 class="text-xl font-semibold mb-2">Contas Registradas</h2>
        <ul id="userList" class="divide-y divide-gray-200"></ul>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const userRole = localStorage.getItem('role');
        
        if (!token || userRole !== 'admin') {
            window.location.href = '/';
        }

        async function apiFetch(url, options = {}) {
            options.headers = { ...options.headers, 'Authorization': `Bearer ${token}` };
            const response = await fetch(url, options);
            if (response.status === 401 || response.status === 403) {
                alert("Sessão expirada ou acesso negado.");
                window.location.href = '/';
            }
            return response;
        }

        async function fetchUsers() {
            const res = await apiFetch('/api/users/');
            if (!res.ok) return;
            const users = await res.json();
            const list = document.getElementById('userList');
            list.innerHTML = '';
            
            users.forEach(u => {
                const roleBadge = u.role === 'admin' 
                    ? `<span class="bg-indigo-900 text-white px-2 py-1 rounded text-xs font-bold uppercase">👑 Master</span>`
                    : `<span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs font-bold uppercase">Operador</span>`;

                list.innerHTML += `
                    <li class="py-4 flex flex-col md:flex-row md:justify-between items-center hover:bg-gray-50 px-3 rounded border-b">
                        <div class="flex-grow w-full">
                            <strong class="text-lg text-gray-800">${u.username}</strong>
                            <div class="mt-1">${roleBadge}</div>
                        </div>
                        <div class="mt-4 md:mt-0 flex flex-wrap gap-2 justify-end">
                            <button onclick="resetPassword(${u.id}, '${u.username}')" class="text-yellow-600 hover:text-yellow-800 text-sm font-bold border border-yellow-200 px-3 py-1 rounded hover:bg-yellow-50 shadow-sm">🔑 Trocar Senha</button>
                            <button onclick="changeRole(${u.id}, '${u.username}')" class="text-indigo-600 hover:text-indigo-800 text-sm font-bold border border-indigo-200 px-3 py-1 rounded hover:bg-indigo-50 shadow-sm">🔄 Mudar Perfil</button>
                            <button onclick="deleteUser(${u.id}, '${u.username}')" class="text-red-500 hover:text-red-700 text-sm font-bold border border-red-200 px-3 py-1 rounded hover:bg-red-50">🗑️ Excluir Conta</button>
                        </div>
                    </li>`;
            });
        }

        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                username: document.getElementById('userName').value.toLowerCase().trim(),
                password: document.getElementById('userPass').value,
                role: document.getElementById('userRole').value
            };

            const res = await apiFetch('/api/users/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                fetchUsers();
                e.target.reset();
            } else {
                const error = await res.json();
                alert("Erro: " + JSON.stringify(error.detail));
            }
        });

        async function resetPassword(id, username) {
            const newPassword = prompt(`Digite a nova senha para o usuário '${username}':`);
            if (!newPassword) return;

            const res = await apiFetch(`/api/users/${id}/password`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ new_password: newPassword })
            });

            if (res.ok) alert("Senha alterada com sucesso!");
            else alert("Erro ao trocar senha.");
        }

        async function changeRole(id, username) {
            const newRole = prompt(`Digite o novo perfil para '${username}' (admin ou operador):`);
            if (newRole !== 'admin' && newRole !== 'operador') {
                if (newRole) alert("O perfil deve ser exatamente 'admin' ou 'operador'.");
                return;
            }

            const res = await apiFetch(`/api/users/${id}/role`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ role: newRole })
            });

            if (res.ok) fetchUsers();
            else {
                const error = await res.json();
                alert("Erro: " + JSON.stringify(error.detail));
            }
        }

        async function deleteUser(id, username) {
            if(!confirm(`Tem certeza absoluta que deseja EXCLUIR a conta de '${username}'?`)) return;
            const res = await apiFetch(`/api/users/${id}`, { method: 'DELETE' });
            if (res.ok) fetchUsers();
            else {
                const error = await res.json();
                alert("Erro: " + JSON.stringify(error.detail));
            }
        }

        fetch('/nav.html').then(r => r.text()).then(html => {
            document.getElementById('nav-placeholder').innerHTML = html;
            const navRole = localStorage.getItem('role');
            const badge = document.getElementById('userBadge');
            if (badge) badge.innerText = navRole || 'Desconhecido';
            if (navRole === 'admin') {
                const navUsuarios = document.getElementById('navUsuarios');
                if(navUsuarios) navUsuarios.style.display = 'inline-block';
            }
        });

        fetchUsers();
    </script>
</body>
</html>
